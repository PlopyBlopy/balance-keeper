name: balance-keeper

services:
  balance-keeper-postgres:
    image: postgres:18-alpine
    container_name: balance-keeper-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - balance_keeper_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - balance-keeper-net

  balance-keeper-migrate:
    image: migrate/migrate
    container_name: balance-keeper-migrate
    depends_on:
      balance-keeper-postgres:
        condition: service_healthy
    volumes:
      - ../balance-keeper-service/migrations:/migrations
    command:
      [
        "-path", "/migrations",
        "-database", "postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@balance-keeper-postgres:5432/${POSTGRES_DB}?sslmode=disable",
        "up"
      ]
    networks:
      - balance-keeper-net

networks:
  balance-keeper-net:
    driver: bridge

volumes:
  balance_keeper_data: